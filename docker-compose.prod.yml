version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: brainloom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    networks:
      - brainloom-net

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    env_file:
      - ./auth-service/.env.production
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "4001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - brainloom-net

  tutorial-service:
    build:
      context: ./tutorial-service
    container_name: tutorial-service
    env_file:
      - ./tutorial-service/.env.production
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "4002"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    networks:
      - brainloom-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    env_file:
      - ./api-gateway/.env.production
    depends_on:
      auth-service:
        condition: service_healthy
      tutorial-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - brainloom-net

  brainloom-frontend:
    build:
      context: ./brainloom-frontend
      dockerfile: Dockerfile
    container_name: brainloom-frontend
    env_file:
      - ./brainloom-frontend/.env.production
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 35s
    networks:
      - brainloom-net

volumes:
  mysql-data:

networks:
  brainloom-net:
    driver: bridge
