name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            if [ -z "${{ secrets.APP_DIR }}" ]; then
              echo "APP_DIR secret is not set"
              exit 1
            fi

            cd "${{ secrets.APP_DIR }}"

            git fetch origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build

            echo "Waiting for services to become healthy..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4000/health >/dev/null && curl -fsS http://127.0.0.1:3000 >/dev/null; then
                echo "Health checks passed"
                exit 0
              fi
              echo "Attempt ${i}/30: services not ready yet"
              sleep 5
            done

            echo "Health checks failed"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=150
            exit 1
